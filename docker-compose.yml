version: '3.8'

services:
  # 1. Banco de Dados MySQL
  db:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: meubanco
    volumes:
      - ./banco.sql:/docker-entrypoint-initdb.d/banco.sql
    networks:
      - app-network

  # 2. Nossa Aplicação PHP (Construída a partir do dockerfile)
  app:
    build: .
    depends_on:
      - db
    networks:
      - app-network

  # 3. Load Balancer Nginx
  proxy:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - app-network

networks:
  app-network:
    driver: bridge